<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KTP Pro Dashboard | Full Width</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        body{font-family:'Inter',sans-serif;letter-spacing:-0.01em}
        .custom-shadow{box-shadow:0 1px 3px 0 rgb(0 0 0 / 0.1),0 1px 2px -1px rgb(0 0 0 / 0.1)}
        .btn-primary{background:#2563eb;color:white;transition:.2s}
        .btn-primary:hover{background:#1d4ed8}
        input:focus,select:focus,textarea:focus{border-color:#3b82f6;outline:none}
    </style>
</head>

<body class="bg-[#f8fafc] min-h-screen">

<div class="max-w-7xl mx-auto p-6 lg:p-12">

    <header class="flex flex-col md:flex-row justify-between items-start md:items-center gap-6 mb-12">

        <div>
            <h1 class="text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30">
                </div>
                KTP Management <span class="text-blue-600">Pro</span>
            </h1>
            <p class="text-slate-500 mt-2 font-medium">Sistem pengelolaan identitas kependudukan digital.</p>
        </div>

        <div class="flex items-center gap-4 w-full md:w-auto">
            <input id="search" onkeyup="searchData()" placeholder="Cari NIK atau Nama..."
                   class="pl-6 pr-6 py-3 w-full md:w-80 bg-white border border-slate-200 rounded-2xl shadow-sm">
        </div>

    </header>


    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-12">

        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
            <p class="text-slate-500 text-sm font-medium">Total Penduduk</p>
            <h3 id="totalData" class="text-4xl font-black text-slate-900 mt-2">0</h3>
        </div>

        <div class="bg-white p-6 rounded-3xl border border-slate-200 shadow-sm">
            <p class="text-slate-500 text-sm font-medium">Status Server</p>
            <h3 class="text-slate-900 text-2xl font-bold mt-2">
                Online
            </h3>
        </div>

        <div onclick="loadKtp()" class="bg-blue-600 p-6 rounded-3xl shadow-xl cursor-pointer">
            <p class="text-white">Refresh Database</p>
        </div>

    </div>


    <div class="grid grid-cols-1 xl:grid-cols-12 gap-8">

        <div class="xl:col-span-4">

            <section class="bg-white p-8 rounded-[2rem] border border-slate-200 shadow-sm">

                <h2 class="text-lg font-bold mb-6">Registrasi Data</h2>

                <input id="nomorKtp" placeholder="NIK" class="w-full border p-3 rounded mb-3">
                <input id="namaLengkap" placeholder="Nama Lengkap" class="w-full border p-3 rounded mb-3">

                <select id="jenisKelamin" class="w-full border p-3 rounded mb-3">
                    <option value="LAKI_LAKI">Laki Laki</option>
                    <option value="PEREMPUAN">Perempuan</option>
                </select>

                <input id="tanggalLahir" type="date" class="w-full border p-3 rounded mb-3">

                <textarea id="alamat" placeholder="Alamat" class="w-full border p-3 rounded mb-3"></textarea>

                <button onclick="createKtp()" class="btn-primary w-full p-4 rounded-xl font-bold">
                    Daftarkan
                </button>

            </section>

        </div>



        <div class="xl:col-span-8">

            <table class="w-full bg-white rounded-2xl overflow-hidden">

                <thead class="bg-gray-100">

                <tr>
                    <th class="p-4 text-left">Nama</th>
                    <th class="p-4 text-left">Detail</th>
                    <th class="p-4 text-right">Aksi</th>
                </tr>

                </thead>

                <tbody id="ktpTable"></tbody>

            </table>

        </div>

    </div>

</div>



<div id="editModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center">

    <div class="bg-white p-8 rounded-3xl w-[400px]">

        <h2 class="text-xl font-bold mb-4">Edit Data</h2>

        <input id="editId" type="hidden">

        <input id="editNomor" class="border p-3 rounded w-full mb-3">
        <input id="editNama" class="border p-3 rounded w-full mb-3">

        <select id="editGender" class="border p-3 rounded w-full mb-3">
            <option value="LAKI_LAKI">Laki Laki</option>
            <option value="PEREMPUAN">Perempuan</option>
        </select>

        <input id="editTanggal" type="date" class="border p-3 rounded w-full mb-3">
        <input id="editAlamat" class="border p-3 rounded w-full mb-3">

        <div class="flex gap-3">

            <button onclick="updateKtp()" class="btn-primary flex-1 p-3 rounded">
                Simpan
            </button>

            <button onclick="closeModal()" class="border flex-1 p-3 rounded">
                Batal
            </button>

        </div>

    </div>

</div>



<div id="toast" class="fixed bottom-10 right-10 bg-black text-white px-6 py-4 rounded-xl hidden">
    <span id="toastMsg"></span>
</div>



<script>

    const API="/api/ktp"
    let globalData=[]


    function showToast(msg){

    const t=document.getElementById("toast")
    document.getElementById("toastMsg").innerText=msg
    t.classList.remove("hidden")

    setTimeout(()=>{t.classList.add("hidden")},3000)

    }



    async function loadKtp(){

    try{

    const res=await fetch(API)

    if(!res.ok){
    showToast("Gagal mengambil data")
    return
    }

    const data=await res.json()

    if(!Array.isArray(data)) return

    globalData=data

    renderTable(data)

    document.getElementById("totalData").innerText=data.length

    }catch(e){

    showToast("Server tidak dapat diakses")

    }

    }



    function renderTable(data){

    let html=""

    data.forEach(k=>{

    html+=`

    <tr>

    <td class="p-4 font-bold">
    ${k.namaLengkap}
    </td>

    <td class="p-4">

    <div>${k.nomorKtp}</div>
    <div class="text-sm text-gray-500">${k.jenisKelamin}</div>
    <div class="text-sm text-gray-500">${k.tanggalLahir}</div>
    <div class="text-xs text-gray-400">${k.alamat}</div>

    </td>

    <td class="p-4 text-right">

    <button onclick="openEdit(${k.id})" class="text-blue-600 mr-3">
    Edit
    </button>

    <button onclick="deleteKtp(${k.id})" class="text-red-600">
    Delete
    </button>

    </td>

    </tr>

    `

    })

    document.getElementById("ktpTable").innerHTML=html

    }



    function searchData(){

    const key=document.getElementById("search").value.toLowerCase()

    const filtered=globalData.filter(k=>

    k.namaLengkap.toLowerCase().includes(key)||
    k.nomorKtp.includes(key)

    )

    renderTable(filtered)

    }



    async function createKtp(){

    const data={

    nomorKtp:nomorKtp.value,
    namaLengkap:namaLengkap.value,
    jenisKelamin:jenisKelamin.value,
    tanggalLahir:tanggalLahir.value,
    alamat:alamat.value

    }

    if(!data.nomorKtp||!data.namaLengkap){

    showToast("NIK dan Nama wajib diisi")
    return

    }

    try{

    const res=await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
    })

    if(!res.ok){
    showToast("Gagal menyimpan data")
    return
    }

    showToast("DATA BERHASIL DIBUAT")

    loadKtp()

    }catch(e){

    showToast("Server error")

    }

    }



    async function deleteKtp(id){

    if(!confirm("Hapus data?")) return

    try{

    const res=await fetch(API+"/"+id,{method:"DELETE"})

    if(!res.ok){
    showToast("Gagal menghapus data")
    return
    }

    showToast("DATA BERHASIL DIHAPUS")

    loadKtp()

    }catch(e){

    showToast("Server error")

    }

    }



    function openEdit(id){

    const data=globalData.find(x=>x.id===id)

    if(!data){
    showToast("Data tidak ditemukan")
    return
    }

    document.getElementById("editModal").classList.remove("hidden")

    editId.value=data.id
    editNomor.value=data.nomorKtp
    editNama.value=data.namaLengkap
    editGender.value=data.jenisKelamin
    editTanggal.value=data.tanggalLahir
    editAlamat.value=data.alamat

    }



    function closeModal(){

    document.getElementById("editModal").classList.add("hidden")

    }



    async function updateKtp(){

    const id=editId.value

    const data={

    nomorKtp:editNomor.value,
    namaLengkap:editNama.value,
    jenisKelamin:editGender.value,
    tanggalLahir:editTanggal.value,
    alamat:editAlamat.value

    }

    try{

    const res=await fetch(API+"/"+id,{
    method:"PUT",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify(data)
    })

    if(!res.ok){
    showToast("Gagal update data")
    return
    }

    closeModal()

    showToast("DATA BERHASIL DIPERBARUI")

    loadKtp()

    }catch(e){

    showToast("Server error")

    }

    }



    loadKtp()

</script>

</body>
</html>
